databaseChangeLog:
  - changeSet:
      id: "operational-data-1"
      author: "HU-19dev"
      changes:
        - sql:
            splitStatements: true
            sql: |
              -- Time Zone
              INSERT INTO time_zone (time_zone_name, utc_offset_minutes) VALUES ('America/Bogota', -300);

              -- State/Province
              INSERT INTO state_province (country_id, state_name, state_code) VALUES 
              ((SELECT country_id FROM country WHERE iso_alpha2 = 'CO'), 'Cundinamarca', 'CUN'),
              ((SELECT country_id FROM country WHERE iso_alpha2 = 'ES'), 'Comunidad de Madrid', 'MD');

              -- City
              INSERT INTO city (state_province_id, time_zone_id, city_name) VALUES 
              ((SELECT state_province_id FROM state_province WHERE state_code = 'CUN'), (SELECT time_zone_id FROM time_zone WHERE time_zone_name = 'America/Bogota'), 'Bogotá'),
              ((SELECT state_province_id FROM state_province WHERE state_code = 'MD'), (SELECT time_zone_id FROM time_zone WHERE time_zone_name = 'America/Bogota'), 'Madrid');

              -- District
              INSERT INTO district (city_id, district_name) VALUES 
              ((SELECT city_id FROM city WHERE city_name = 'Bogotá'), 'Engativá'),
              ((SELECT city_id FROM city WHERE city_name = 'Madrid'), 'Barajas');

              -- Addresses
              INSERT INTO address (district_id, address_line_1, postal_code) VALUES 
              ((SELECT district_id FROM district WHERE district_name = 'Engativá'), 'Avenida El Dorado #103-9', '110911'),
              ((SELECT district_id FROM district WHERE district_name = 'Barajas'), 'Av de la Hispanidad s/n', '28042');

              -- Airlines
              INSERT INTO airline (home_country_id, airline_code, airline_name, iata_code) VALUES 
              ((SELECT country_id FROM country WHERE iso_alpha2 = 'CO'), 'AVA', 'Avianca', 'AV'),
              ((SELECT country_id FROM country WHERE iso_alpha2 = 'CL'), 'LAN', 'LATAM Airlines', 'LA'),
              ((SELECT country_id FROM country WHERE iso_alpha2 = 'US'), 'AAL', 'American Airlines', 'AA');

              -- Airports
              INSERT INTO airport (address_id, airport_name, iata_code, icao_code) VALUES 
              ((SELECT address_id FROM address WHERE address_line_1 = 'Avenida El Dorado #103-9'), 'El Dorado International Airport', 'BOG', 'SKBO'),
              ((SELECT address_id FROM address WHERE address_line_1 = 'Av de la Hispanidad s/n'), 'Adolfo Suárez Madrid–Barajas Airport', 'MAD', 'LEMD');

              -- Manufacturers
              INSERT INTO aircraft_manufacturer (manufacturer_name) VALUES 
              ('Airbus'),
              ('Boeing');

              -- Models
              INSERT INTO aircraft_model (aircraft_manufacturer_id, model_code, model_name) VALUES 
              ((SELECT aircraft_manufacturer_id FROM aircraft_manufacturer WHERE manufacturer_name = 'Airbus'), 'A320neo', 'Airbus A320neo'),
              ((SELECT aircraft_manufacturer_id FROM aircraft_manufacturer WHERE manufacturer_name = 'Boeing'), '737-MAX8', 'Boeing 737 MAX 8');

              -- Individual Aircraft
              INSERT INTO aircraft (airline_id, aircraft_model_id, registration_number, serial_number) VALUES 
              ((SELECT airline_id FROM airline WHERE airline_code = 'AVA'), (SELECT aircraft_model_id FROM aircraft_model WHERE model_code = 'A320neo'), 'N-AVA123', 'MSN-001'),
              ((SELECT airline_id FROM airline WHERE airline_code = 'LAN'), (SELECT aircraft_model_id FROM aircraft_model WHERE model_code = '737-MAX8'), 'CC-LAN456', 'MSN-002');
      rollback:
        - sqlFile:
            path: "../../../05_rollbacks/02_dml/00_inserts/05_operational_data.sql"
            relativeToChangelogFile: true
