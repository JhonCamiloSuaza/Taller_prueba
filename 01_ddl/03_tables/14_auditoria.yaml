databaseChangeLog:
  - changeSet:
      id: "auditoria-1"
      author: "HU-15dev"
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE TABLE audit_log (
                  audit_log_id   uuid PRIMARY KEY DEFAULT gen_random_uuid(),
                  table_name     varchar(64) NOT NULL,
                  record_id      uuid        NOT NULL,
                  action         varchar(10) NOT NULL,
                  old_data       jsonb,
                  new_data       jsonb,
                  changed_by     uuid        REFERENCES user_account(user_account_id),
                  changed_at     timestamptz NOT NULL DEFAULT now()
              );

              CREATE OR REPLACE FUNCTION audit_trigger_func()
              RETURNS TRIGGER AS $$
              DECLARE
                  v_record_id uuid;
              BEGIN
                  IF (TG_OP = 'DELETE') THEN
                      SELECT value::uuid INTO v_record_id FROM jsonb_each_text(to_jsonb(OLD)) LIMIT 1;
                      INSERT INTO audit_log (table_name, record_id, action, old_data, new_data)
                      VALUES (TG_TABLE_NAME, v_record_id, TG_OP, to_jsonb(OLD), NULL);
                  ELSIF (TG_OP = 'UPDATE') THEN
                      SELECT value::uuid INTO v_record_id FROM jsonb_each_text(to_jsonb(NEW)) LIMIT 1;
                      INSERT INTO audit_log (table_name, record_id, action, old_data, new_data)
                      VALUES (TG_TABLE_NAME, v_record_id, TG_OP, to_jsonb(OLD), to_jsonb(NEW));
                  ELSIF (TG_OP = 'INSERT') THEN
                      SELECT value::uuid INTO v_record_id FROM jsonb_each_text(to_jsonb(NEW)) LIMIT 1;
                      INSERT INTO audit_log (table_name, record_id, action, old_data, new_data)
                      VALUES (TG_TABLE_NAME, v_record_id, TG_OP, NULL, to_jsonb(NEW));
                  END IF;
                  RETURN NULL;
              END;
              $$ LANGUAGE plpgsql;
      rollback:
        - sql:
            splitStatements: true
            sql: |
              DROP FUNCTION IF EXISTS audit_trigger_func() CASCADE;
              DROP TABLE IF EXISTS audit_log CASCADE;
