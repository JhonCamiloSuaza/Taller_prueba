databaseChangeLog:
  - changeSet:
      id: "func-updated-at-1"
      author: "HU-02dev"
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION update_updated_at_column()
              RETURNS TRIGGER AS $$
              BEGIN
                  NEW.updated_at = now();
                  RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;
      rollback:
        - sql:
            splitStatements: false
            sql: |
              DROP FUNCTION IF EXISTS update_updated_at_column() CASCADE;
