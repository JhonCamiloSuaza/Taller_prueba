databaseChangeLog:
  - changeSet:
      id: "aeropuerto-indexes-1"
      author: "HU-07dev"
      changes:
        - sql:
            splitStatements: true
            sql: |
              CREATE INDEX idx_airport_address_id           ON airport(address_id);
              CREATE INDEX idx_terminal_airport_id          ON terminal(airport_id);
              CREATE INDEX idx_boarding_gate_terminal_id    ON boarding_gate(terminal_id);
              CREATE INDEX idx_runway_airport_id            ON runway(airport_id);
      rollback:
        - sql:
            splitStatements: true
            sql: |
              DROP INDEX IF EXISTS idx_runway_airport_id;
              DROP INDEX IF EXISTS idx_boarding_gate_terminal_id;
              DROP INDEX IF EXISTS idx_terminal_airport_id;
              DROP INDEX IF EXISTS idx_airport_address_id;
