databaseChangeLog:
  - changeSet:
      id: "pagos-indexes-1"
      author: "HU-12dev"
      changes:
        - sql:
            splitStatements: true
            sql: |
              CREATE INDEX idx_payment_sale_id              ON payment(sale_id);
              CREATE INDEX idx_payment_status_id            ON payment(payment_status_id);
              CREATE INDEX idx_payment_transaction_payment_id    ON payment_transaction(payment_id);
              CREATE INDEX idx_refund_payment_id            ON refund(payment_id);
      rollback:
        - sql:
            splitStatements: true
            sql: |
              DROP INDEX IF EXISTS idx_refund_payment_id;
              DROP INDEX IF EXISTS idx_payment_transaction_payment_id;
              DROP INDEX IF EXISTS idx_payment_status_id;
              DROP INDEX IF EXISTS idx_payment_sale_id;
