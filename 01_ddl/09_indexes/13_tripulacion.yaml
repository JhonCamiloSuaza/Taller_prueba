databaseChangeLog:
  - changeSet:
      id: "tripulacion-indexes-1"
      author: "HU-14dev"
      changes:
        - sql:
            splitStatements: true
            sql: |
              CREATE INDEX idx_crew_member_person_id        ON crew_member(person_id);
              CREATE INDEX idx_flight_crew_flight_id        ON flight_crew_assignment(flight_id);
              CREATE INDEX idx_flight_crew_member_id        ON flight_crew_assignment(crew_member_id);
              CREATE INDEX idx_flight_crew_role_id          ON flight_crew_assignment(crew_role_id);
      rollback:
        - sql:
            splitStatements: true
            sql: |
              DROP INDEX IF EXISTS idx_flight_crew_role_id;
              DROP INDEX IF EXISTS idx_flight_crew_member_id;
              DROP INDEX IF EXISTS idx_flight_crew_flight_id;
              DROP INDEX IF EXISTS idx_crew_member_person_id;
